asyncapi: 3.0.0

info:
  title: gigastt WebSocket API
  version: "1.0"
  description: |
    Real-time speech-to-text WebSocket API powered by GigaAM v3 e2e_rnnt.
    On-device Russian speech recognition via ONNX Runtime.

    ## Connection Flow

    1. Client connects to `ws://{host}:{port}/v1/ws` (default: `ws://127.0.0.1:9876/v1/ws`).
       `/ws` remains as a deprecated alias — removal planned for v1.0.
       - Server binds `127.0.0.1` by default; use `--bind-all` (or `GIGASTT_ALLOW_BIND_ANY=1`) plus `--host 0.0.0.0` for Docker.
    2. Server sends `ready` message with model info, protocol version, `supported_rates`, and `diarization` capability
    3. (Optional) Client sends `configure` to pick a non-default `sample_rate` and/or enable `diarization`
    4. Client streams raw PCM16 audio as binary frames (default 48 kHz mono, or the negotiated rate)
    5. Server responds with `partial` and `final` transcript messages
    6. Client sends `stop` (JSON) or closes connection to end session

    ## Audio Format

    - Encoding: PCM16 signed little-endian
    - Sample rate: 8,000 / 16,000 / 24,000 / 44,100 / 48,000 Hz supported; default 48 kHz for backward compat (server resamples to 16 kHz internally via rubato polyphase FIR)
    - Channels: 1 (mono)
    - Frame size: up to the server's `--ws-frame-max-bytes` (default 512 KiB ≈ 16 s at 16 kHz PCM16)

    ## Limits & Security

    All defaults below are configurable from v0.7.0 onward via CLI flags or environment variables
    (see `gigastt serve --help`):

    - `--pool-size` (default 4) — concurrent inference sessions
    - `--ws-frame-max-bytes` (default 512 KiB) — max WebSocket frame / message
    - `--body-limit-bytes` (default 50 MiB) — max REST request body
    - `--idle-timeout-secs` (default 300) — WebSocket idle disconnect
    - `--max-session-secs` (default 3600) — wall-clock session cap (silence-stream DoS guard; 0 disables)
    - `--shutdown-drain-secs` (default 10) — max wait for in-flight sessions on SIGTERM
    - `--rate-limit-per-minute` (default 0 = off) — per-IP token-bucket limit on `/v1/*` (HTTP 429 + `Retry-After` when exhausted; `/health` exempt)
    - Audio buffer cap: 5 seconds (WebSocket streaming)
    - File transcription cap: 10 minutes (offline mode)
    - Bind address: 127.0.0.1 by default; `--bind-all` / `GIGASTT_ALLOW_BIND_ANY=1` required for non-loopback
    - Cross-origin requests: denied by default; use `--allow-origin URL` (repeatable) or `--cors-allow-any` to opt in
    - Pool saturation: WebSocket `error` payload includes `retry_after_ms`; REST returns 503 + `Retry-After: 30`
    - Graceful shutdown: live WS/SSE sessions flush a final transcript and close with `1001 Going Away` on SIGTERM
    - Internal errors hidden from clients (generic message sent)
  license:
    name: MIT
    url: https://github.com/ekhodzitsky/gigastt/blob/main/LICENSE
  contact:
    name: gigastt
    url: https://github.com/ekhodzitsky/gigastt

servers:
  local:
    host: 127.0.0.1:9876
    protocol: ws
    description: Local development server (default host and port)
  docker:
    host: 0.0.0.0:9876
    protocol: ws
    description: Docker container (use --host 0.0.0.0 to expose)

defaultContentType: application/json

channels:
  audio:
    address: /v1/ws
    description: |
      Canonical WebSocket endpoint for audio streaming and transcription.
      Accepts binary PCM16 frames and JSON control messages.
      `/ws` remains as a deprecated alias — removal planned for v1.0.
    messages:
      ready:
        $ref: "#/components/messages/ready"
      partial:
        $ref: "#/components/messages/partial"
      final:
        $ref: "#/components/messages/final"
      error:
        $ref: "#/components/messages/error"
      configure:
        $ref: "#/components/messages/configure"
      stop:
        $ref: "#/components/messages/stop"
      audioFrame:
        $ref: "#/components/messages/audioFrame"

operations:
  onConnect:
    action: receive
    channel:
      $ref: "#/channels/audio"
    summary: Server sends ready message upon connection
    messages:
      - $ref: "#/channels/audio/messages/ready"

  sendConfigure:
    action: send
    channel:
      $ref: "#/channels/audio"
    summary: Client configures session parameters (must be sent before first audio frame)
    messages:
      - $ref: "#/channels/audio/messages/configure"

  sendAudio:
    action: send
    channel:
      $ref: "#/channels/audio"
    summary: Client streams PCM16 audio frames
    messages:
      - $ref: "#/channels/audio/messages/audioFrame"

  sendStop:
    action: send
    channel:
      $ref: "#/channels/audio"
    summary: Client requests server to finalize transcription
    messages:
      - $ref: "#/channels/audio/messages/stop"

  receiveTranscript:
    action: receive
    channel:
      $ref: "#/channels/audio"
    summary: Server sends partial or final transcription results
    messages:
      - $ref: "#/channels/audio/messages/partial"
      - $ref: "#/channels/audio/messages/final"

  receiveError:
    action: receive
    channel:
      $ref: "#/channels/audio"
    summary: Server sends error when inference fails
    messages:
      - $ref: "#/channels/audio/messages/error"

components:
  messages:
    ready:
      name: ready
      title: Ready
      summary: Server is ready to accept audio
      description: |
        Sent immediately after WebSocket handshake.
        Contains model identifier, expected sample rate, and protocol version.
      contentType: application/json
      payload:
        $ref: "#/components/schemas/ReadyMessage"

    partial:
      name: partial
      title: Partial Transcript
      summary: Interim transcription result (may change with more audio)
      contentType: application/json
      payload:
        $ref: "#/components/schemas/PartialMessage"

    final:
      name: final
      title: Final Transcript
      summary: Finalized transcription for a completed utterance
      contentType: application/json
      payload:
        $ref: "#/components/schemas/FinalMessage"

    error:
      name: error
      title: Error
      summary: Inference or processing error
      description: |
        Internal error details are hidden from clients for security.
        The message field contains a generic user-facing description.
      contentType: application/json
      payload:
        $ref: "#/components/schemas/ErrorMessage"

    stop:
      name: stop
      title: Stop
      summary: Client requests server to stop and finalize
      contentType: application/json
      payload:
        $ref: "#/components/schemas/StopMessage"

    configure:
      name: configure
      title: Configure
      summary: Client configures session parameters before sending audio
      contentType: application/json
      payload:
        $ref: "#/components/schemas/ConfigureMessage"

    audioFrame:
      name: audioFrame
      title: Audio Frame
      summary: Raw PCM16 audio data
      description: |
        Binary WebSocket frame containing signed 16-bit little-endian PCM samples.
        Sample rate: one of the server's `supported_rates` (default 48 kHz), mono. Each sample is 2 bytes.
        Odd-length frames are carried over into the next frame to preserve PCM alignment.
      contentType: application/octet-stream
      payload:
        type: string
        format: binary
        description: Raw PCM16 signed little-endian audio samples at the negotiated rate (mono)

  schemas:
    ReadyMessage:
      type: object
      required:
        - type
        - model
        - sample_rate
        - version
      properties:
        type:
          type: string
          const: ready
          description: Message type discriminator
        model:
          type: string
          example: gigaam-v3-e2e-rnnt
          description: Identifier of the loaded speech recognition model
        sample_rate:
          type: integer
          example: 48000
          description: Expected audio sample rate in Hz (client should send at this rate)
        version:
          type: string
          example: "1.0"
          description: WebSocket protocol version (semver-lite major.minor)
        supported_rates:
          type: array
          items:
            type: integer
          example: [8000, 16000, 24000, 44100, 48000]
          description: List of supported input sample rates (Hz)
        diarization:
          type: boolean
          example: false
          description: Whether speaker diarization is available

    PartialMessage:
      type: object
      required:
        - type
        - text
        - timestamp
      properties:
        type:
          type: string
          const: partial
          description: Message type discriminator
        text:
          type: string
          example: "привет как"
          description: Current interim transcription (may change as more audio arrives)
        timestamp:
          type: number
          format: double
          example: 1712700000.123
          description: Unix timestamp (seconds since epoch) when the segment was produced
        words:
          type: array
          items:
            $ref: "#/components/schemas/WordInfo"
          description: Word-level transcription with timestamps

    FinalMessage:
      type: object
      required:
        - type
        - text
        - timestamp
      properties:
        type:
          type: string
          const: final
          description: Message type discriminator
        text:
          type: string
          example: "привет как дела"
          description: Finalized transcription for the completed utterance
        timestamp:
          type: number
          format: double
          example: 1712700001.456
          description: Unix timestamp (seconds since epoch) when the segment was finalized
        words:
          type: array
          items:
            $ref: "#/components/schemas/WordInfo"
          description: Word-level transcription with timestamps

    ErrorMessage:
      type: object
      required:
        - type
        - message
        - code
      properties:
        type:
          type: string
          const: error
          description: Message type discriminator
        message:
          type: string
          example: "Inference failed. Please check audio format."
          description: User-facing error description (internal details are hidden)
        code:
          type: string
          example: inference_error
          description: Machine-readable error code
          enum:
            - inference_error
            - inference_panic
            - configure_too_late
            - invalid_sample_rate
            - timeout
            - pool_closed
            - max_session_duration_exceeded
            - payload_too_large
        retry_after_ms:
          type: integer
          example: 30000
          description: |
            Suggested delay before retry (milliseconds). Present only for transient backpressure
            errors (e.g. pool saturation). Omitted from JSON otherwise.

    ConfigureMessage:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          const: configure
          description: Message type discriminator
        sample_rate:
          type: integer
          example: 16000
          description: Input audio sample rate in Hz
        diarization:
          type: boolean
          example: true
          description: Enable speaker diarization (if available)

    StopMessage:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          const: stop
          description: Message type discriminator

    WordInfo:
      type: object
      required:
        - word
        - start
        - end
      properties:
        word:
          type: string
          example: "привет"
        start:
          type: number
          format: double
          example: 0.5
          description: Word start time in seconds
        end:
          type: number
          format: double
          example: 0.8
          description: Word end time in seconds
